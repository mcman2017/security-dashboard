name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Version from tag
        id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # ---- Plugin tarball → GitHub Release asset -------------------------
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run package
      - name: Collect tarball + checksum
        id: tarball
        run: |
          TARBALL=$(ls headlamp-security-dashboard-*.tar.gz | head -1)
          echo "file=$TARBALL" >> "$GITHUB_OUTPUT"
          sha256sum "$TARBALL" | tee checksums.txt

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.tarball.outputs.file }}
            checksums.txt
          generate_release_notes: true

      # ---- Multi-arch images → ghcr.io ------------------------------------
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/security-dashboard-backend:${{ steps.v.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/security-dashboard-backend:latest

      - name: Plugin initContainer image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/headlamp-security-dashboard:${{ steps.v.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/headlamp-security-dashboard:latest

      # ---- Helm chart → OCI ------------------------------------------------
      - uses: azure/setup-helm@v4
      - name: Push chart
        run: |
          helm package charts/security-dashboard --version "${{ steps.v.outputs.version }}" \
            --app-version "${{ steps.v.outputs.version }}"
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
          helm push security-dashboard-"${{ steps.v.outputs.version }}".tgz \
            oci://ghcr.io/${{ github.repository_owner }}/charts

      # ---- Reminder --------------------------------------------------------
      - name: ArtifactHub reminder
        run: |
          echo "::notice::Update artifacthub/security-dashboard/artifacthub-pkg.yml:"
          echo "::notice::  version + archive-url (v${{ steps.v.outputs.version }}) + checksum below"
          cat checksums.txt
