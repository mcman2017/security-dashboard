apiVersion: v2
name: security-dashboard
description: >-
  Backend for the Security Dashboard Headlamp plugin — launches on-demand
  Trivy scans (CIS / NSA / full vulnerability) as Kubernetes Jobs, stores the
  normalized findings, and serves them to the plugin through the Kubernetes
  apiserver service proxy.
