{{- if .Values.suppressions.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: security-dashboard-suppressions
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "security-dashboard.labels" . | nindent 4 }}
data:
  suppressions.yaml: |
    {{- .Values.suppressions.content | nindent 4 }}
{{- end }}
