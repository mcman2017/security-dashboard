# The backend Deployment: creates/watches/deletes its own scan Jobs + reads
# their pod logs, all within the release namespace.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccounts.backend }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "security-dashboard.labels" . | nindent 4 }}
---
# The on-demand Trivy scan Jobs run as this SA. Its token lives only as long
# as the Job. Cluster-wide read is granted by the ClusterRole in
# clusterrole.yaml.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccounts.scanner }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "security-dashboard.labels" . | nindent 4 }}
